name: parkliapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  url_launcher: ^6.2.0
  supabase_flutter: ^2.4.0
  app_links: ^6.0.0
  image_picker: ^1.0.7
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  http: ^1.2.0
  shared_preferences: ^2.2.0
  pdf: ^3.10.8
  printing: ^5.11.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false //مؤقتاً خليته فولس عشان تشتغل الايقونة حقت التطبيق بالاندرويد
  image_path: "assets/images/app_logo2.png"
  adaptive_icon_background: "#195A64"
  adaptive_icon_foreground: "assets/images/app_logo2.png"